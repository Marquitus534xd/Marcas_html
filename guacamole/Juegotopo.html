<style>
  body{
    background: url("fondo5.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }

  .taulell { 
    display: grid; 
    grid-template-columns: repeat(3, 150px); 
    gap: 10px; 
  }

  .forat { 
    width: 150px; 
    height: 150px; 
    position: relative; 
    cursor: crosshair; 
  }

  .forat img { 
    width: 100%; 
    height: 100%; 
    position: absolute; 
    display: none; 
  }

  .forat img.activa { 
    display: block; 
  }

  #marcador{
    color:white;
    font-family: Arial;
  }
#fotoBonus {
  position: absolute;
  left: 50px;
  top: 50%;
  transform: translateY(-50%);
  width: 400px;
  display: none;
  z-index: 1000;
}
#fotoBonus2 {
  position: absolute;
  right: 50px;
  top: 50%;
  transform: translateY(-50%); 
  width: 600px;
  display: none;
  z-index: 1000;
}

  h1 {
    color:rgb(255, 255, 255);
    font-family: Arial;
    background-color: black;
    padding: 5px;
  }

  #fotoBonus, #fotoBonus2 {
    transition: opacity 0.5s ease;
  }

  #marcador {
    font-size: 24px;
    margin-top: 20px;
    background-color: black;
    padding: 10px;
  }
</style>

<div class="taulell">
  <div class="forat" onclick="picar(this)"><img src="casilla.png" class="activa"><img src="digletsaliendo.png"><img src="digletpupa.png"><img src="huecoroto.png"></div>

<h2 id="marcador">Punts: 0</h2>
<img id="fotoBonus" src="medallas.png">
<img id="fotoBonus2" src="medallas2ç3.png">
<script>
let punts = 0;
const forats = document.querySelectorAll(".forat");
const marcador = document.getElementById("marcador");

setInterval(moureTopo, 1000);

function moureTopo() {

  forats.forEach(f => {
    const img = f.querySelectorAll("img");
    img[0].style.display = "block";
    img[1].style.display = "none";
    img[2].style.display = "none";
  });

  const numTopos = Math.floor(Math.random()*3)+1;

  let usados = [];

  for(let i=0;i<numTopos;i++){

    let aleatori;

    do{
      aleatori = Math.floor(Math.random()*forats.length);
    }while(usados.includes(aleatori));

    usados.push(aleatori);

    const img = forats[aleatori].querySelectorAll("img");

    img[0].style.display="none";
    img[1].style.display="block";
  }

}

function picar(forat) {
  const img = forat.querySelectorAll("img");
  if (img[1].style.display === "block") {
    punts += 10;
    marcador.innerText = "Punts: " + punts;
    new Audio("boing.mp3").play();
    img[1].style.display = "none";
    img[2].style.display = "block";
    setTimeout(()=>{
      img[2].style.display = "none";
      img[0].style.display = "block";
    },1000);
  } 
  else if (img[0].style.display === "block") {
    img[0].style.display = "none";
    img[3].style.display = "block";
    setTimeout(()=>{
      img[3].style.display = "none";
      img[0].style.display = "block";
    },1000);
  }
  if(punts == 100){
    mostrarFoto();
  }
  if(punts == 200){
    mostrarFoto2();
  }
}

  img[0].style.display = "none";
  img[1].style.display = "none";
  img[2].style.display = "block";
  img[3].style.display = "block";

function mostrarFoto(){

  const foto = document.getElementById("fotoBonus");

  foto.style.display = "block";
}
function mostrarFoto2(){

  const foto = document.getElementById("fotoBonus2");

  foto.style.display = "block";
}
</script>
